<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="rock2.css">
    <title>Rock game</title>
</head>
<body>
    <h1 class="title2">Rock Paper Scissors</h1>
<!-- steps -->
 <!-- 
1. Create the 3 buttons ( rocks, paper , scissors)
2. Display the User Move, computer Move and the results

rules of the game: 
rock beats scissor 
paper beats rocks 
scissor beats paper 
 -->

    <h2><i>Rules</i></h2>
    <p>Rock beats scissors, Paper beats rocks and Scissors beats paper.</p>
    <br>

    <button onclick="
    playTheGame2('Rock2')" class="move-button2">
    <img src="Images/Rock2-emoji.jpg" alt="rock image" class="move-image2"></button>
    
    <button onclick="
    playTheGame2('Paper2')"  class="move-button2">
    <img src="Images/Paper2-emoji.jpg" alt="paper image" class="move-image2"></button>
    
    <button onclick="
    playTheGame2('Scissors2')" class="move-button2">
    <img src="Images/Scissors2-emoji.jpg" alt="scissor image" class="move-image2"></button>

    <!-- Score area  -->
    <p class="js-results2 cs-results2"></p>

    <!-- Add an image to represent the rock,paper and scissor -->
    <p class="js-moves2">
        <!-- You 
        <img src="Images/rock.jpg" class="move-image2" >
        <img src="Images/scissor.jpg" alt="" class="move-image2 " > 
        Computer -->
    </p>
    <p class="js-score2 cs-score2"></p>

    <!-- reset button -->
    <button onclick="
     score2.wins = 0;
     score2.losses = 0; 
     score2.ties = 0; 
     // remove the score from the local storage 
    localStorage.removeItem('score2')
    updateScore2()
     " class="cs-reset-button2">Reset score </button>

<script src="rock2.js"></script>
</body>
</html>
