<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Rock game</title>
</head>
<body>
    <h1>Rock Paper Scissors</h1>
<!-- steps -->
 <!-- 
1. Create the 3 buttons ( rocks, paper , scissors)
2. Display the User Move, computer Move and the results

rules of the game: 
rock beats scissor 
paper beats rocks 
scissor beats paper 
 -->
    <h2><i>Rules</i></h2>
    <p>Rock beats scissors, Paper beats rocks and Scissors beats paper.</p>
    <br>

    <button onclick="
    playTheGame('Rock')">Rock</button>
    
    <button onclick="
    playTheGame('Paper')">Paper</button>
    
    <button onclick="playTheGame('Scissors')">Scissors</button>

    <!-- Score area  -->
    <p class="js-results"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>

    <!-- reset button -->
    <button onclick="
     score.wins = 0;
     score.losses = 0; 
     score.ties = 0; 
     // remove the score from the local storage 
    localStorage.removeItem('score')
    updateScore()
     ">Reset score </button>

<hr>
