<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock game</title>
    <link rel="stylesheet" href="rock.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
<!-- steps --> 
 <!-- 
1. Create the 3 buttons ( rocks, paper , scissors)
2. Display the User Move, computer Move and the results

rules of the game: 
rock beats scissor 
paper beats rocks 
scissor beats paper 
 -->
    <h2><i>Rules</i></h2>
    <p>Rock beats scissors, Paper beats rocks and Scissors beats paper.</p>
    <br>

    <button onclick="
    playTheGame('Rock')" class="move-button">
    <img src="Images/Rock-emoji.jpg" alt="rock image" class="move-image"
    ></button>
    
    <button onclick="
    playTheGame('Paper')" class="move-button">
    <img src="Images/Paper-emoji.jpg" alt="paper image" class="move-image"
    
    ></button>
    
    <button onclick="playTheGame('Scissors')" class="move-button">
    <img src="Images/Scissors-emoji.jpg" alt="scissors-image" class="move-image"></button>

    <!-- Score area  -->
    <p class="js-results cs-results"><p>
    <p class="js-moves"></p>
    <p class="js-score cs-score"></p>

    <!-- reset button -->
    <button onclick="
     score.wins = 0;
     score.losses = 0; 
     score.ties = 0; 
     // remove the score from the local storage 
    localStorage.removeItem('score')
    updateScore()
      " class="cs-reset-button">Reset score </button>

<script src="rock.js"></script>
</body>
</html>
